# Runs the app joined to your Tailscale tailnet as its own machine
# ("option-fair-value"), served over HTTPS at
#   https://option-fair-value.<your-tailnet>.ts.net
# Nothing is exposed on the public internet or the local LAN.
#
# Setup:
#   1. Create an auth key at https://login.tailscale.com/admin/settings/keys
#      (reusable off, ephemeral off; add a tag if you use ACL tags).
#   2. Copy .env.example to .env and set TS_AUTHKEY (and FRED_API_KEY).
#   3. docker compose up -d --build
#
# HTTPS requires MagicDNS + HTTPS certificates enabled in the tailnet's
# admin console (DNS page). First cert issuance can take a minute.

services:
  tailscale:
    image: tailscale/tailscale:latest
    hostname: option-fair-value # machine name on the tailnet
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=true # no TUN device / extra capabilities needed
      - TS_SERVE_CONFIG=/config/serve.json
    volumes:
      - tailscale-state:/var/lib/tailscale
      - ./tailscale/serve.json:/config/serve.json:ro
    restart: unless-stopped

  app:
    build: .
    # Share the Tailscale container's network namespace so tailscaled can
    # proxy to the app on 127.0.0.1:8000 and the app is reachable only
    # through the tailnet.
    network_mode: service:tailscale
    environment:
      - FRED_API_KEY=${FRED_API_KEY}
      - OFV_SCANNER_ENABLED=${OFV_SCANNER_ENABLED:-0}
    volumes:
      - ofv-data:/data
    depends_on:
      - tailscale
    restart: unless-stopped

volumes:
  tailscale-state:
  ofv-data:
